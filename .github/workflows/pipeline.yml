name: Daily pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SOLR_URL: ${{ secrets.SOLR_URL }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
      REMOTEOK_USER_AGENT: ${{ secrets.REMOTEOK_USER_AGENT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - run: pip install -r requirements-pipeline.txt
      - name: Ingest current snapshot
        run: python ingest.py
      - name: Index jobs in Solr
        run: python indexer.py
      - name: Compute and persist trends
        run: python trend_engine.py --skip-s3
